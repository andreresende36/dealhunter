# =============================================================================
# Crivo — Docker Compose
# Serviços: redis, scraper, sender, api, admin (Next.js)
# Uso: docker compose up -d
# =============================================================================

networks:
  net:
    driver: bridge

volumes:
  crivo_data:
  redis_data:

services:

  # ---------------------------------------------------------------------------
  # Redis — Estado compartilhado entre containers (MonitorState)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: crivo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Scraper — Pipeline de coleta do Mercado Livre (roda a cada 1h)
  # ---------------------------------------------------------------------------
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crivo_scraper
    restart: unless-stopped
    command: python -m src.workers.scraper_worker
    env_file: .env
    volumes:
      - crivo_data:/app/data
      - ./data/ml_main_categories_all_items.json:/app/data/ml_main_categories_all_items.json:ro
      - ./src:/app/src:ro
      - ./logs:/app/logs
    networks:
      - net
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - USE_REDIS_STATE=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('redis://redis:6379/0'); r.ping()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Sender — Envio de ofertas com distribuição temporal (8h-23h BRT)
  # ---------------------------------------------------------------------------
  sender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crivo_sender
    restart: unless-stopped
    command: python -m src.workers.sender_worker
    env_file: .env
    volumes:
      - crivo_data:/app/data
      - ./data/ml_main_categories_all_items.json:/app/data/ml_main_categories_all_items.json:ro
      - ./src:/app/src:ro
      - ./logs:/app/logs
    networks:
      - net
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - USE_REDIS_STATE=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('redis://redis:6379/0'); r.ping()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # API — FastAPI/Uvicorn na porta 8000 (lê estado do Redis)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crivo_api
    restart: unless-stopped
    command: python -m src.workers.api_worker
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - crivo_data:/app/data
      - ./data/ml_main_categories_all_items.json:/app/data/ml_main_categories_all_items.json:ro
      - ./src:/app/src:ro
      - ./logs:/app/logs
    networks:
      - net
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - USE_REDIS_STATE=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/state')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Admin — Painel Next.js (porta 3000)
  # Acesso: http://localhost:3000
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: crivo_admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://api:8000
    networks:
      - net
    depends_on:
      - api
